name: Build & Check

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Static analysis (detekt)
        run: ./gradlew detekt --no-daemon

      - name: Lint
        run: ./gradlew lintDebug --no-daemon

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: opencode-debug.apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      # The release output dir is `release/` when unsigned but `release-signed/` (or a
      # variant name) once a signing config is applied. Match both so CI keeps working
      # once the OPENCODE_STORE_* secrets are wired up.
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: opencode-release.apk
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
